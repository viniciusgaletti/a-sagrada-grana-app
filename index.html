<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A Sagrada Grana — Gestão Financeira Pessoal</title>
    <meta name="description" content="Registre entradas, saídas, investimentos e gastos diários com clareza e disciplina. A Sagrada Grana é seu diário financeiro pessoal." />
    <meta name="author" content="Vinícius Galetti" />
    <meta property="og:title" content="A Sagrada Grana" />
    <meta property="og:description" content="Gestão financeira pessoal com a disciplina de uma planilha e a experiência de um produto moderno." />
    <meta property="og:image" content="/og-image.png" />
    <!-- Google Fonts: Instrument Serif + DM Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
    <!-- Apply saved theme before React mounts to prevent FOUC -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('theme');
          if (saved === 'dark') {
            document.documentElement.classList.add('dark');
          } else if (saved === 'light') {
            document.documentElement.classList.remove('dark');
          } else {
            // Default: respect system preference
            if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
              document.documentElement.classList.add('dark');
            }
          }
        } catch (e) {}
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <!-- @skip-protected: Do not remove. Required for app features. -->
    <script src="https://goskip.dev/skip.js"></script>
    <!-- @skip-protected: Do not remove. App entrypoint. -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
